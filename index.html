<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everything Rank - AI 智能排名</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effect"></div>
    
    <main class="container">
        <header>
            <h1 class="glow-text">Everything Rank</h1>
            <p class="subtitle">输入任意主题，AI 为你生成排行榜（结果仅供娱乐）</p>
        </header>

        <section class="input-section glass-panel">
            <div class="form-group">
                <label for="topicInput">你想排名什么？</label>
                <input type="text" id="topicInput" placeholder="例如：高考数学难度、最好玩的开放世界游戏..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="countInput">数量限制 (1-20)</label>
                <div class="range-container">
                    <input type="range" id="countInput" min="1" max="20" value="10">
                    <span id="countValue" class="count-badge">10</span>
                </div>
            </div>

            <button id="generateBtn" class="primary-btn">
                <span class="btn-text">生成排名</span>
                <span class="loader hidden"></span>
            </button>
        </section>

        <div id="exportWrapper" class="export-wrapper hidden">
            <div id="captureArea" class="capture-area">
                <h2 id="rankingTitle" class="ranking-title"></h2>
                <section id="resultSection" class="result-section">
                    <!-- 排名卡片将被动态插入这里 -->
                </section>
                <div class="watermark">※ 以上排名由 AI 自动生成，不具备完全真实性，结果仅供娱乐参考。</div>
            </div>
            <div class="action-buttons">
                <button id="exportBtn" class="secondary-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    保存为图片
                </button>
            </div>
        </div>
    </main>

    <!-- 全屏加载动画遮罩 -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner-container">
            <div class="magic-spinner"></div>
            <p class="loading-text">AI 正在深度思考中...</p>
        </div>
    </div>

    <!-- html2canvas 用于将网页导出为图片 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
